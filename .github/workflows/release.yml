name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: python3 -m pip install --upgrade pip pytest jsonschema
      - run: python3 scripts/test_platform.py release-check --quick
      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            VERSION
            docs
            golden
