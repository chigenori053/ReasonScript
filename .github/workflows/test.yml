name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: python3 -m pip install --upgrade pip pytest jsonschema
      - run: python3 scripts/test_platform.py test
      - run: python3 scripts/test_platform.py regression
